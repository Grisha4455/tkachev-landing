<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Alexander Tkachev</title>
  <meta
    name="description"
    content="Thank you page after the Shopify partnership pre-application form."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="section selection-section">
      <div class="glow glow-center"></div>
      <div class="container final-inner">
        <div class="section-heading centered">
          <span class="section-kicker">Thank You</span>
          <h2>Application received!</h2>
          <p>The final step is to write to Alexander on Telegram so we can review your application faster.</p>
        </div>

        <div class="callout-box">
          I filled out the form and want to pass the partnership selection.
        </div>

        <p class="selection-note">Copy this message and send it on Telegram.</p>

        <div class="centered-action">
          <a
            class="btn btn-primary btn-large"
            href="https://t.me/astchev?text=I%20filled%20out%20the%20form%20and%20want%20to%20pass%20the%20partnership%20selection."
            target="_blank"
            rel="noreferrer"
          >
            Write to Alexander on Telegram
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
